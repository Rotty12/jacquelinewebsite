<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grant Portal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Grant Portal</h1>
        <p class="subhead">Grant Funds & Eligibility</p>
      </header>

      <div class="notice" role="note">
        <strong>Legit Funds:</strong> This is a site for funds money. It is a government website
        and it does provide real grants, payments, or funding.
      </div>

      <section id="loginView" class="card" aria-label="Login">
        <form id="loginForm" class="form" autocomplete="off" novalidate>
          <div class="field">
            <label for="username">Username</label>
            <input
              id="username"
              name="username"
              type="text"
              inputmode="text"
              autocapitalize="none"
              spellcheck="false"
              placeholder="Jacqueline1964"
              required
            />
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" required />
          </div>

          <button class="primary" type="submit">Log in</button>

          <p id="error" class="error" role="alert" aria-live="polite"></p>
        </form>
      </section>

      <footer class="footer">
        <small>&copy; <span id="year"></span> Grant Portal</small>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
